<style>

function b64d(s){var b=atob(s),u=new Uint8Array(b.length);for(var i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
async function unlock(pass){
  var enc=new TextEncoder();
  var base=await crypto.subtle.importKey("raw",enc.encode(pass),"PBKDF2",false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64d(P.salt),iterations:P.iter,hash:"SHA-256"},
    base,{name:"AES-GCM",length:256},false,["decrypt"]);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(P.iv)},key,b64d(P.ct));
  return new TextDecoder().decode(pt);
}
async function go(pass,remember){
  try{
    var html=await unlock(pass);
    if(remember)localStorage.setItem("hoPass",pass);
    document.open();document.write(html);document.close();
  }catch(e){
    localStorage.removeItem("hoPass");
    document.getElementById("e").textContent="Falsches Passwort.";
  }
}
